name: Build Legacy XLAM on real Excel

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-xlam:
    runs-on: [self-hosted, Windows, Excel]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verify source
        shell: powershell
        run: |
          npm ci
          npm run check
      - name: Build XLAM using installed Microsoft Excel
        shell: powershell
        run: npm run legacy:build
      - name: Upload XLAM
        uses: actions/upload-artifact@v4
        with:
          name: ProfiExcelHelper-Legacy
          path: legacy-vba/dist/ProfiExcelHelper-Legacy.xlam
          if-no-files-found: error
