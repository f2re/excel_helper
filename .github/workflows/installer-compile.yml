name: Compile Windows installer project

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile-installer:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Inno Setup compiler
        shell: powershell
        run: choco install innosetup --no-progress -y
      - name: Create compile-only payload fixture
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release\payload\legacy, release\payload\template, release\payload\officejs, release\payload\docs | Out-Null
          Set-Content release\payload\legacy\ProfiExcelHelper-Legacy.xlam 'compile fixture'
          Set-Content release\payload\template\ProfiExcelHelper-Template.xltm 'compile fixture'
          Copy-Item manifest.xml release\payload\officejs\manifest.xml
          Copy-Item manifest-office2016.xml release\payload\officejs\manifest-office2016.xml
          Copy-Item README.md release\payload\docs\README.md
      - name: Compile Inno Setup project
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File installer\windows\build-installer.ps1 -PayloadRoot release\payload -OutputDirectory release
          if (-not (Test-Path release\ProfiExcelHelper-Setup-1.2.0.exe)) { throw 'Installer EXE was not produced.' }
          $size = (Get-Item release\ProfiExcelHelper-Setup-1.2.0.exe).Length
          if ($size -lt 100000) { throw "Compiled installer is unexpectedly small: $size" }
          Write-Host "Inno Setup compile smoke passed: $size bytes"
