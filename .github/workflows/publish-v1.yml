name: Publish v1.0.0 release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-v1.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verify release source
        run: |
          npm ci
          npm run check
      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          zip -qr release/profi-excel-helper-v1.0.0-dist.zip dist
          git archive --format=zip --output=release/profi-excel-helper-v1.0.0-source.zip HEAD
          sha256sum release/*.zip > release/SHA256SUMS.txt
      - name: Create tag and GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f -a v1.0.0 -m "ПрофиПомощник для Excel v1.0.0" "$GITHUB_SHA"
          git push --force origin v1.0.0
          gh release delete v1.0.0 --yes --cleanup-tag=false || true
          gh release create v1.0.0 release/* \
            --verify-tag \
            --title "ПрофиПомощник для Excel v1.0.0" \
            --notes "Первый проверенный выпуск: 114 пользовательских функций, 44 апплета и составитель сводного расписания. Перед производственным внедрением выполните ручную приёмку в целевом клиенте Excel по docs/TESTING.md."
