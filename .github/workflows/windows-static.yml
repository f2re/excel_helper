name: Windows packaging checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-static:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Clean install and full verification
        shell: powershell
        run: |
          npm ci
          npm run check
      - name: Parse project PowerShell sources
        shell: powershell
        run: |
          $failed = $false
          $files = @(
            Get-ChildItem legacy-vba\scripts -Recurse -File -Include *.ps1,*.psm1
            Get-ChildItem installer\windows -Recurse -File -Include *.ps1,*.psm1
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              $failed = $true
              $messages = ($errors | ForEach-Object { $_.Message }) -join '; '
              Write-Error "$($file.FullName): $messages"
            }
          }
          if ($failed) { exit 1 }
          Write-Host "Parsed $($files.Count) PowerShell files"
