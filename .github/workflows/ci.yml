name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Generated files are current
        run: git diff --exit-code -- docs/FUNCTIONS.md docs/APPLETS.md src/functions/functions.json src/functions/definitions.json
