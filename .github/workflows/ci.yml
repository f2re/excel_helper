name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Clean install
        run: npm ci
      - name: Full verification
        run: npm run check
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: profi-excel-helper-dist
          path: dist/
          if-no-files-found: error
