name: 🐞 Ошибка
about: Воспроизводимая ошибка функции, апплета или расписания
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Не прикладывайте реальные персональные данные. Подготовьте обезличенный пример."
  - type: input
    id: version
    attributes:
      label: Версия
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Excel
      options:
        - Windows
        - macOS
        - Excel for the web
        - Другое
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение и сообщение об ошибке
    validations:
      required: true
