name: 🐞 Ошибка
description: Сообщить о воспроизводимой проблеме
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Не прикладывайте персональные данные или реальные кадровые книги. Используйте обезличенный пример."
  - type: input
    id: version
    attributes:
      label: Версия надстройки
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: excel
    attributes:
      label: Клиент Excel и операционная система
      placeholder: Excel Microsoft 365, Windows 11
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемый результат
  - type: textarea
    id: actual
    attributes:
      label: Фактический результат
